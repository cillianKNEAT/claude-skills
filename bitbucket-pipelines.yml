image: php:7.4-cli

definitions:
  steps:
    - step: &deploy-staging
        name: Deploy to WP Engine Staging
        deployment: staging
        script:
          - pipe: atlassian/ssh-run:0.4.1
            variables:
              SSH_USER: 'kneatstg-butbucket-cbracken'
              SERVER: 'kneatstg.ssh.wpengine.net'
              SSH_KEY: $WPENGINE_SSH_KEY
              MODE: 'command'
              COMMAND: |
                cd /nas/content/live/kneatstg/wp-content
                git fetch origin dev
                git pull origin dev

    - step: &deploy-production
        name: Deploy to WP Engine Production
        deployment: production
        script:
          - pipe: atlassian/ssh-run:0.4.1
            variables:
              SSH_USER: 'kneatstg-butbucket-cbracken'
              SERVER: 'kneat.ssh.wpengine.net'
              SSH_KEY: $WPENGINE_SSH_KEY
              MODE: 'command'
              COMMAND: |
                cd /nas/content/live/kneat/wp-content
                git fetch origin master
                git pull origin master

pipelines:
  branches:
    master:
      - step: *deploy-production

    dev:
      - step: *deploy-staging